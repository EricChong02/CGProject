project:
  name: pointcloud_benchmark

experiment:
  name: pointnet2_modelnet40
  seed: 42

dataset:
  name: modelnet40
  root: datasets_raw/modelnet40
  processed_root: datasets_processed/modelnet40
  num_points: 1024
  num_classes: 40
  use_synthetic_data: true

model:
  name: pointnet2
  input_channels: 3
  num_classes: 40

training:
  batch_size: 8
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0

evaluation:
  batch_size: 8

visualization:
  dpi: 150

runtime:
  device: cpu

output:
  experiment_dir: experiments/pointnet2_modelnet40
  log_dir: logs/pointnet2_modelnet40
  checkpoint_dir: checkpoints/pointnet2_modelnet40
  result_dir: results/pointnet2_modelnet40
  figure_dir: figures/pointnet2_modelnet40


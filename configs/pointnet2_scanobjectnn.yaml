project:
  name: pointcloud_benchmark

experiment:
  name: pointnet2_scanobjectnn
  seed: 42

dataset:
  name: scanobjectnn
  root: datasets_raw/scanobjectnn
  processed_root: datasets_processed/scanobjectnn
  num_points: 1024
  num_classes: 15
  use_synthetic_data: true

model:
  name: pointnet2
  input_channels: 3
  num_classes: 15

training:
  batch_size: 8
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0

evaluation:
  batch_size: 8

visualization:
  dpi: 150

runtime:
  device: cpu

output:
  experiment_dir: experiments/pointnet2_scanobjectnn
  log_dir: logs/pointnet2_scanobjectnn
  checkpoint_dir: checkpoints/pointnet2_scanobjectnn
  result_dir: results/pointnet2_scanobjectnn
  figure_dir: figures/pointnet2_scanobjectnn


project:
  name: pointcloud_benchmark

experiment:
  name: improved_pointnet2_scanobjectnn
  seed: 42

dataset:
  name: scanobjectnn
  root: datasets_raw/scanobjectnn
  processed_root: datasets_processed/scanobjectnn
  num_points: 1024
  num_classes: 15
  normalize: true
  variant: pb_t50_rs
  split_name: main_split
  filter_background_with_mask: false
  upright_axis: y
  augmentations:
    random_point_dropout:
      enabled: true
      max_dropout_ratio: 0.875
    random_scaling:
      enabled: true
      scale_low: 0.8
      scale_high: 1.25
    random_shifting:
      enabled: true
      shift_range: 0.1
    gaussian_jitter:
      enabled: true
      sigma: 0.01
      clip: 0.05
    random_rotation_upright_axis:
      enabled: false

model:
  name: improved_pointnet2
  input_channels: 3
  num_classes: 15

training:
  batch_size: 8
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0

evaluation:
  batch_size: 8

visualization:
  dpi: 150

runtime:
  device: cpu

output:
  experiment_dir: experiments/improved_pointnet2_scanobjectnn
  log_dir: logs/improved_pointnet2_scanobjectnn
  checkpoint_dir: checkpoints/improved_pointnet2_scanobjectnn
  result_dir: results/improved_pointnet2_scanobjectnn
  figure_dir: figures/improved_pointnet2_scanobjectnn
